name: "Reply Tracker — Recruiter Outreach"
slug: "reply-tracker-recruiter"
description: "Checks Zoho Mail inbox for replies to outbound emails and updates the CSV"
enabled: true
trigger:
  type: manual
  cron: "00 09 * * 1-5"
group: "Sales"
instructions: |
  You are a reply tracking agent for outbound sales.
  Check the Zoho Mail inbox for replies to outreach emails and update the CSV accordingly.
  Never ask for clarification — act immediately.
  
  RULES:
  - Do NOT write any text between tool calls — complete all actions before writing your report
  - Classify each reply as Interested, Not Interested, or Bounce
  - Auto-replies must be skipped entirely — do not update CSV for auto-replies
  - Interested: positive reply, asking for more info, wants a call
  - Not Interested: unsubscribe, no thanks, not relevant
  - Bounce: delivery failure, mailer-daemon, undeliverable
steps:
  - name: "Read Inbox"
    content: |
      Search Zoho Mail inbox for emails received in the last 7 days.
      For each email found, note the sender email address, subject, and date.
      Ignore emails sent by yourself ({{zoho_email}}).
      
  - name: "Read CSV"
    content: |
      Read all rows from "{{csv_file}}" using the GDrive connector with limit 500.
      For each inbox email, check if the sender's email address matches any row in the CSV.
      Only process emails where there is a matching CSV row.
      
  - name: "Classify Replies"
    content: |
      For each matched email, read the full email body using read_email.
      
      FIRST — check if it is an auto-reply. Skip it entirely if ANY of these are true:
      - Subject starts with "Automatic reply", "Auto-Reply", "Out of Office", "OOO", "Autoreply"
      - Body contains "out of the office", "I will be out", "will return on", "limited access to email", "I am currently away"
      - Sender is mailer-daemon or postmaster
      
      If it is an auto-reply — do NOT classify it, do NOT update the CSV for that contact.
      
      For all other emails, classify as:
      - Interested: asks a question, wants to know more, mentions a call, positive reply
      - Not Interested: no thanks, unsubscribe, not relevant, remove me
      - Bounce: subject contains "Undeliverable" or "Delivery failed", or sender is mailer-daemon
      
  - name: "Update CSV"
    content: |
      For each classified reply (non-auto-reply only), call update_rows on "{{csv_file}}":
      - If Interested: set column "Interested" to "yes"
      - If Not Interested: set column "Not Interested" to "yes"
      - If Bounce: set column "Bounce" to "yes"
      matchColumn: Email
      matchValues: [list of matched email addresses]
      
  - name: "Report"
    content: |
      Summarise:
      - Total replies found
      - Auto-replies skipped (list names)
      - Interested contacts (name + email)
      - Not Interested contacts (name + email)
      - Bounced contacts (name + email)
      - Confirm CSV updated
      
connectors:
  - name: "AJ Google Drive"
    type: gdrive
    connection_id: "gdrive"
  - name: "Zoho Mail"
    type: zoho-mail
    connection_id: "zohoemail"
params:
  - name: csv_file
    label: "CSV File Name"
    default: "apollo-contacts-export-usa-dallas-recruiter-100.csv"
  - name: zoho_email
    label: "Your Zoho Email"
    default: "test@gmail.com"