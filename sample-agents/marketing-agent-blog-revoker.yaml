name: "Blog Revoker"
slug: "blog-revoker"
description: "Revokes a published blog post — deletes the HTML file, removes the blog card and sitemap entry, and resets the CSV row so it can be republished"
enabled: true
trigger:
  type: manual
group: "Marketing"

instructions: |
  You are a blog revocation agent. Undo a published blog post completely in one run.
  Never ask for clarification — act immediately. Your FIRST action must always be a tool call.

  RULES:
  - You receive the post slug via {{slug}}
  - Complete ALL 5 steps: delete file, update index, update sitemap, reset CSV, report
  - If a file read returns "not found", skip that step and note it in the report
  - Never modify any CSV row except the one matching {{slug}}

steps:
  - name: "Delete Blog Post File"
    content: |
      Call delete_file on the GitHub connector:
        path: blog/{{slug}}.html
        message: "revert: remove blog post — {{slug}}"

      If the file does not exist, note "file not found" and continue.

  - name: "Remove Blog Card from Index"
    content: |
      Call read_file on GitHub for blog/index.html.
      Find and remove the entire <a> block containing href="{{slug}}.html"
      (from the opening <a href="{{slug}}.html" class="blog-card" to its closing </a>).
      Call write_file with the updated content.
      message: "chore: remove blog card — {{slug}}"

  - name: "Remove Sitemap Entry"
    content: |
      Call read_file on GitHub for sitemap.xml.
      Find and remove the entire <url> block containing:
        <loc>https://www.yoursite.com/blog/{{slug}}.html</loc>
      Call write_file with the updated content.
      message: "chore: remove sitemap entry — {{slug}}"

  - name: "Reset CSV Row"
    content: |
      Call update_rows on "{{csv_file}}" to clear the row for {{slug}}:
        - matchColumn: Slug, matchValue: {{slug}}, setColumn: Status,         setValue: (empty)
        - matchColumn: Slug, matchValue: {{slug}}, setColumn: Published Date, setValue: (empty)
        - matchColumn: Slug, matchValue: {{slug}}, setColumn: URL,            setValue: (empty)

  - name: "Report"
    content: |
      Output a short summary:
      - Slug revoked: {{slug}}
      - Blog file deleted: yes / not found
      - Blog index card removed: yes / not found
      - Sitemap entry removed: yes / not found
      - CSV row reset: yes
      - Status: Ready to republish — run Blog Publisher with slug {{slug}} when ready

connectors:
  - name: "Google Drive"
    type: gdrive
  - name: "GitHub Website Repo"
    type: github

params:
  - name: slug
    label: "Blog Post Slug to Revoke"
  - name: csv_file
    label: "Topics CSV File Name"
    default: "blog-topics.csv"
