name: "Products By Category"
slug: "products-by-category"
description: "Shows doctor distribution across specialties as a pie chart"
enabled: true
trigger:
  type: manual
group: "Analytics"
instructions: |
  You are a database analytics agent.
  
  RULES:
  - Run the MySQL query immediately using the MySQL tool
  - Run the query ONCE only — do not repeat it
  - After the query completes, output the raw JSON result and stop
  
  CHART:
  - Show top 3 categories as slices in a donut style
  - Group remaining categories into "Others"
  - Legend on the right
  - Return the result as pie chart
steps:
  - name: "Query by Category"
    content: |
      Run this MySQL query:
        select count(product_id),category from products group by category;
      
connectors:
  - name: "MySQL"
    type: mysql
    connection_id: "mysqlc"