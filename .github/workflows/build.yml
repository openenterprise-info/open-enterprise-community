name: Build and Push to Docker Hub

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image
        run: |
          if [[ "${{ github.repository }}" == *"commercial"* ]]; then
            echo "IMAGE=open-enterprise-commercial" >> $GITHUB_OUTPUT
          else
            echo "IMAGE=open-enterprise-community" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f app/Dockerfile \
            -t "${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}" \
            -t "${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.IMAGE }}:latest" \
            app/

      - name: Push to Docker Hub
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.IMAGE }}:${{ steps.version.outputs.VERSION }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.IMAGE }}:latest"

      - name: Prune old images on runner
        run: docker image prune -f
